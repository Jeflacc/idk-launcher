<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@700;800&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: transparent;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      font-family: 'Outfit', sans-serif;
    }

    .splash-container {
      position: relative;
      width: 400px;
      height: 400px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
    }

    .logo-mark {
      width: 80px;
      height: 80px;
      background: linear-gradient(135deg, #22c55e, #15803d);
      border-radius: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 10px 30px rgba(34, 197, 94, 0.4);
      animation: popIn 1s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
      opacity: 0;
      transform: scale(0.5);
    }

    .logo-mark::after {
      content: '';
      width: 30px;
      height: 30px;
      background: white;
      border-radius: 8px;
      animation: pulse 2s infinite ease-in-out;
    }

    .title {
      margin-top: 30px;
      color: white;
      font-size: 2rem;
      font-weight: 800;
      letter-spacing: 2px;
      opacity: 0;
      transform: translateY(20px);
      animation: fadeUp 1s cubic-bezier(0.16, 1, 0.3, 1) 0.3s forwards;
    }

    .subtitle {
      margin-top: 8px;
      color: #a1a1aa;
      font-size: 0.9rem;
      letter-spacing: 4px;
      text-transform: uppercase;
      opacity: 0;
      animation: fadeUp 1s cubic-bezier(0.16, 1, 0.3, 1) 0.5s forwards;
    }

    @keyframes popIn {
      to { opacity: 1; transform: scale(1); }
    }

    @keyframes fadeUp {
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes pulse {
      0% { transform: scale(1); opacity: 1; }
      50% { transform: scale(0.6); opacity: 0.7; }
      100% { transform: scale(1); opacity: 1; }
    }
  </style>
</head>
<body>
  <div class="splash-container">
    <div class="logo-mark"></div>
    <div class="title">IDK LAUNCHER</div>
    <div class="subtitle">Starting Engine</div>
  </div>
</body>
</html>
