<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>IDK Launcher</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@600;700;800&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="app"></div>
    
    <!-- Generic confirmation dialog -->
    <div id="confirm-dialog-modal" class="confirm-modal">
      <div class="confirm-modal-content confirm-modal-content--danger">
        <h3 id="confirm-dialog-title">Confirm</h3>
        <p id="confirm-dialog-message"></p>
        <div class="confirm-modal-actions">
          <button type="button" id="confirm-dialog-cancel" class="confirm-modal-btn cancel">Cancel</button>
          <button type="button" id="confirm-dialog-confirm" class="confirm-modal-btn confirm">Confirm</button>
        </div>
      </div>
    </div>

    <!-- Delete Modpack Confirmation Modal -->
    <div id="delete-modpack-modal" class="delete-modal">
      <div class="delete-modal-content">
        <h3>Delete Modpack</h3>
        <p id="delete-modal-message"></p>
        
        <div class="delete-modal-checkbox">
          <input type="checkbox" id="delete-files-checkbox" />
          <label for="delete-files-checkbox">Also delete files on disk</label>
        </div>
        
        <div class="delete-modal-actions">
          <button id="delete-modal-cancel" class="delete-modal-btn cancel">Cancel</button>
          <button id="delete-modal-confirm" class="delete-modal-btn confirm">Yes, Delete</button>
        </div>
      </div>
    </div>
    
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
